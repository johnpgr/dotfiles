# BEGIN_KITTY_FONTS
font_family      family=IosevkaInput style=W360
bold_font        family=IosevkaInput style=W360
italic_font      family=IosevkaInput style=W360
bold_italic_font family=IosevkaInput style=W360
# END_KITTY_FONTS

# Font
font_size        12.0
modify_font cell_height 0px
modify_font cell_width 1px
text_composition_strategy legacy

# Window
window_padding_width 0
hide_window_decorations yes
confirm_os_window_close 0
background_opacity 1.0
background_blur 10

# Keybindings
map super+t no_op

# Allow remote access
allow_remote_control yes
listen_on unix:/tmp/kitty

macos_option_as_alt yes

# Aesthetics
shell_integration no-cursor
cursor_shape block
cursor_blink_interval 0
enable_audio_bell no
box_drawing_scale 0.001, 0.1, 1, 1
undercurl_style thin-dense
window_border_width   0px
active_border_color   #585b70
inactive_border_color #585b70
inactive_text_alpha   0.7

# Minimal Tab bar styling 
tab_bar_min_tabs 2
tab_bar_edge                top
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# Performance
# input_delay 0
# repaint_delay 2
# sync_to_monitor no

# Scrollback smooth
momentum_scroll 0.96
pixel_scroll yes

# Core behavior
auto_reload_config 0.1
enabled_layouts splits,tall,stack
tab_bar_filter session:~ or session:^$
tab_title_template "{session_name} {title}"
editor vim

# Good defaults if you want one long-lived kitty instance
# launch kitty as: kitty --single-instance
# Then later invocations open new top-level windows in that instance

# Windows/panes
map ctrl+shift+enter new_window_with_cwd
map alt+shift+= launch --location=vsplit --cwd=current
map alt+shift+- launch --location=hsplit --cwd=current

# Pane focus and resizing (handled by tmux / tmux.nvim)
# map ctrl+h neighboring_window left
# map ctrl+j neighboring_window bottom
# map ctrl+k neighboring_window top
# map ctrl+l neighboring_window right
# map alt+h kitten relative_resize.py left  3
# map alt+j kitten relative_resize.py down  3
# map alt+k kitten relative_resize.py up    3
# map alt+l kitten relative_resize.py right 3

# Zoom-ish toggle
map alt+z toggle_layout stack

# Close pane/tab
map alt+w close_window
map alt+q close_tab

# Tabs
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+[ previous_tab
map ctrl+shift+] next_tab
map ctrl+shift+< move_tab_backward
map ctrl+shift+. move_tab_forward

map ctrl+alt+1 goto_tab 1
map ctrl+alt+2 goto_tab 2
map ctrl+alt+3 goto_tab 3
map ctrl+alt+4 goto_tab 4
map ctrl+alt+5 goto_tab 5
map ctrl+alt+6 goto_tab 6
map ctrl+alt+7 goto_tab 7
map ctrl+alt+8 goto_tab 8
map ctrl+alt+9 goto_tab 9

# Ctrl+Alt+T — open new tab with theme picker (kitten themes)
map shift+alt+t launch --type=tab kitten themes
# Ctrl+Alt+F — open new tab with font picker (kitty +list-fonts)
map shift+alt+f launch --type=tab kitty +list-fonts

map ctrl+equal change_font_size all +2.0
map ctrl+minus change_font_size all -2.0

# Press Ctrl+G, select a compiler diagnostic, and jump to Neovim.
#
# Install bin/compile-jump somewhere on PATH, or replace the program path below.
action_alias compile_jump kitten hints \
  --type=regex \
  --regex '(?P<path>(?:\.{1,2}/|/)?[^:\s][^:\n]*):(?P<line>[0-9]+)(?::(?P<column>[0-9]+))?' \
  --program compile-jump

map ctrl+g compile_jump

# Click OSC 8 file links such as:
#   file:///home/me/project/src/main.c#42:7
#
# compile-wrap emits links in this shape. Kitty provides FILE_PATH and FRAGMENT
# to actions that match file:// links.
protocol file
fragment_matches ^[0-9]+(:[0-9]+)?$
action launch --type=background --cwd=current compile-jump ${FILE_PATH} ${FRAGMENT}
