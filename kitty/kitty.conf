# BEGIN_KITTY_FONTS
font_family      family="Liberation Mono"
bold_font        family='Liberation Mono' style=Regular
italic_font      family='Liberation Mono' style=Regular
bold_italic_font family='Liberation Mono' style=Regular
# END_KITTY_FONTS

# Font
font_size        12.0
modify_font cell_height 0px
modify_font cell_width 0px

# Window
window_padding_width 0
hide_window_decorations no
confirm_os_window_close 0

# Keybindings
map super+t no_op

# Allow remote access
allow_remote_control yes
# listen_on unix:@kitty

macos_option_as_alt yes

# Aesthetics
shell_integration no-cursor
cursor_shape block
cursor_blink_interval 0
enable_audio_bell no
box_drawing_scale 0.001, 0.1, 1, 1
text_composition_strategy platform
undercurl_style thin-dense

# Minimal Tab bar styling 
tab_bar_min_tabs 2
tab_bar_edge                top
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# Performance
input_delay 0
repaint_delay 2
sync_to_monitor no

# Scrollback smooth
momentum_scroll 0.96
pixel_scroll yes

# Core behavior
enabled_layouts splits,tall,stack
tab_bar_filter session:~ or session:^$
tab_title_template "{session_name} {title}"

# Good defaults if you want one long-lived kitty instance
# launch kitty as: kitty --single-instance
# Then later invocations open new top-level windows in that instance

# Windows/panes
map ctrl+shift+enter new_window_with_cwd
map alt+shift+= launch --location=vsplit --cwd=current
map alt+shift+- launch --location=hsplit --cwd=current

# Pane focus
map alt+h neighboring_window left
map alt+j neighboring_window bottom
map alt+k neighboring_window top
map alt+l neighboring_window right

# Pane resizing
map ctrl+alt+h resize_window narrower 3
map ctrl+alt+j resize_window shorter 3
map ctrl+alt+k resize_window taller 3
map ctrl+alt+l resize_window wider 3

# Zoom-ish toggle
map alt+z toggle_layout stack

# Close pane/tab
map alt+w close_window
map alt+q close_tab

# Tabs
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+[ previous_tab
map ctrl+shift+] next_tab
map ctrl+shift+< move_tab_backward
map ctrl+shift+. move_tab_forward

map ctrl+alt+1 goto_tab 1
map ctrl+alt+2 goto_tab 2
map ctrl+alt+3 goto_tab 3
map ctrl+alt+4 goto_tab 4
map ctrl+alt+5 goto_tab 5
map ctrl+alt+6 goto_tab 6
map ctrl+alt+7 goto_tab 7
map ctrl+alt+8 goto_tab 8
map ctrl+alt+9 goto_tab 9

# Sessions
# Ksesh - Browse all saved project sessions and launch new ones using zoxide + fzf
map ctrl+shift+o launch --type=overlay-main bash -lc ksesh
# map ctrl+shift+o goto_session ~/.local/share/kitty/sessions

# Save current active session back to its own file
map f7>s save_as_session --use-foreground-process --match=session:. .

# Save current state to the central sessions dir
map f7>shift+s save_as_session --use-foreground-process --base-dir ~/.local/share/kitty/sessions

# Close current session
map ctrl+shift+x close_session .
